<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eldritch D20 Dice Roller</title>

  <!-- Three.js + Physics -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at top, #0b132b, #02040f);
      font-family: system-ui, sans-serif;
      color: #e0e6ff;
    }

    #ui {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    button {
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #6d28d9, #1e3a8a);
      color: white;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(109,40,217,0.7);
    }

    button:hover {
      box-shadow: 0 0 40px rgba(109,40,217,1);
    }

    #result {
      margin-top: 0.75rem;
      font-size: 1.2rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button onclick="roll()">🎲 Cast the Die</button>
    <div id="result"></div>
  </div>

  <audio id="clack" src="https://cdn.jsdelivr.net/gh/joshua19881228/sound-effects/dice.wav"></audio>

  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 6, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x6b7cff, 0.4));
    const light = new THREE.DirectionalLight(0xa78bfa, 1.2);
    light.position.set(5, 10, 7);
    scene.add(light);

    // Physics world
    const world = new CANNON.World({ gravity: new CANNON.Vec3(0, -9.82, 0) });

    // Floor
    const floorBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
    floorBody.quaternion.setFromEuler(-Math.PI/2, 0, 0);
    world.addBody(floorBody);

    const floorMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x020617 })
    );
    floorMesh.rotation.x = -Math.PI / 2;
    scene.add(floorMesh);

    // D20 geometry
    const geometry = new THREE.IcosahedronGeometry(1.5, 0);
    const material = new THREE.MeshStandardMaterial({
      color: 0x4f46e5,
      metalness: 0.6,
      roughness: 0.25,
      emissive: 0x1e1b4b,
      emissiveIntensity: 0.4
    });

    const dieMesh = new THREE.Mesh(geometry, material);
    scene.add(dieMesh);

    const dieBody = new CANNON.Body({
      mass: 3,
      shape: new CANNON.Sphere(1.5),
      angularDamping: 0.1
    });

    dieBody.position.set(0, 5, 0);
    world.addBody(dieBody);

    const clack = document.getElementById('clack');
    const result = document.getElementById('result');

    function roll() {
      dieBody.velocity.set(0, 0, 0);
      dieBody.angularVelocity.set(0, 0, 0);

      dieBody.position.set(0, 6, 0);
      dieBody.applyImpulse(
        new CANNON.Vec3((Math.random()-0.5)*8, 10, (Math.random()-0.5)*8),
        dieBody.position
      );

      clack.currentTime = 0;
      clack.play();

      result.textContent = 'Rolling...';

      setTimeout(determineResult, 1800);
    }

    function determineResult() {
      const up = new THREE.Vector3(0,1,0);
      let maxDot = -Infinity;
      let face = 1;

      geometry.faces?.forEach((f, i) => {
        const normal = f.normal.clone().applyQuaternion(dieMesh.quaternion);
        const dot = normal.dot(up);
        if (dot > maxDot) {
          maxDot = dot;
          face = i + 1;
        }
      });

      result.textContent = `Result: ${face}`;
    }

    function animate() {
      requestAnimationFrame(animate);
      world.step(1/60);

      dieMesh.position.copy(dieBody.position);
      dieMesh.quaternion.copy(dieBody.quaternion);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
